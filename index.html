<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">

    <title>Claire Park | Health Manager Portfolio</title>
    <!-- Tailwind CSS & Lucide Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Noto+Sans+KR:wght@300;500;700&display=swap');

        :root {
            --claire-pink: #ff9fb5;
            --claire-purple: #c3b5ff;
            --bg-gradient: linear-gradient(135deg, #fff5f8 0%, #f3e8ff 100%);
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: var(--bg-gradient);
            color: #1c1c1e;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
        }

        /* 아이폰 세이프 에어리어 최적화 */
        .safe-top { height: env(safe-area-inset-top); min-height: 44px; }
        .safe-bottom { height: env(safe-area-inset-bottom); min-height: 20px; }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 430px; /* iPhone Pro Max 너비 제한 */
            margin: 0 auto;
            position: relative;
        }

        /* 글래스모피즘 효과 */
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .tab-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            padding-bottom: 120px; /* 네비게이션 공간 */
            scroll-behavior: smooth;
        }

        /* 하단 탭바 */
        .nav-bar {
            position: fixed;
            bottom: calc(env(safe-area-inset-bottom) + 15px);
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 380px;
            height: 75px;
            border-radius: 40px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
            box-shadow: 0 15px 35px rgba(168, 85, 247, 0.15);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #94a3b8;
            transition: all 0.3s;
        }

        .nav-item.active {
            color: #a855f7;
            transform: scale(1.1);
        }

        .nav-item span {
            font-size: 10px;
            font-weight: 700;
            margin-top: 4px;
        }

        /* 젤리 버튼 스타일 */
        .jelly-card {
            background: white;
            border-radius: 30px;
            padding: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.03);
            border: 1px solid rgba(255, 255, 255, 0.8);
            transition: transform 0.2s;
        }

        .jelly-card:active {
            transform: scale(0.97);
        }

        /* 스크롤바 숨기기 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="safe-top"></div>

    <!-- Header -->
    <header className="px-6 py-4 flex items-center justify-between">
        <div class="px-6 py-4 flex justify-between items-end">
            <div>
                <h1 class="text-2xl font-black text-purple-700 tracking-tighter leading-none">CLAIRE PARK</h1>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Health & Safety Expert</p>
            </div>
            <div class="w-10 h-10 glass rounded-2xl flex items-center justify-center shadow-sm">
                <i data-lucide="activity" class="text-pink-500 w-5 h-5"></i>
            </div>
        </div>
    </header>

    <!-- Tab Contents -->
    <div id="content" class="tab-content no-scrollbar">
        <!-- Content will be injected here via JS -->
    </div>

    <!-- Bottom Nav -->
    <nav class="nav-bar glass">
        <div class="nav-item active" onclick="switchTab('home', this)">
            <i data-lucide="home"></i>
            <span>홈</span>
        </div>
        <div class="nav-item" onclick="switchTab('ai', this)">
            <i data-lucide="shield-check"></i>
            <span>AI분석</span>
        </div>
        <div class="nav-item" onclick="switchTab('warehouse', this)">
            <i data-lucide="archive"></i>
            <span>창고</span>
        </div>
        <div class="nav-item" onclick="switchTab('profile', this)">
            <i data-lucide="user"></i>
            <span>프로필</span>
        </div>
    </nav>

    <div class="safe-bottom"></div>
</div>

                <p class="text-slate-500 font-medium mb-8 italic">"건강한 일터, 데이터로 증명합니다."</p>
                
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div class="jelly-card bg-white">
                        <i data-lucide="heart" class="text-pink-500 mb-2"></i>
                        <p class="text-[10px] font-bold text-slate-400 uppercase">건강상담</p>
                        <p class="text-2xl font-black">1,240건</p>
                    </div>
                    <div class="jelly-card bg-white">
                        <i data-lucide="check-circle" class="text-purple-500 mb-2"></i>
                        <p class="text-[10px] font-bold text-slate-400 uppercase">법규준수</p>
                        <p class="text-2xl font-black">100%</p>
                    </div>
                </div>

                <div class="jelly-card bg-gradient-to-br from-purple-600 to-indigo-700 text-white p-8">
                    <h3 class="font-bold text-xl mb-2">2026 보건 프로젝트</h3>
                    <p class="text-sm opacity-80 mb-6">스마트 웨어러블을 활용한 근로자 실시간 피로도 모니터링 시스템 구축 중</p>
                    <button class="w-full py-3 bg-white text-purple-700 rounded-2xl font-black text-sm">상세보기</button>
                </div>
            </div>
        `,
        ai: `
            <div class="animate-in slide-in-from-right-5 duration-500">
                <h2 class="text-2xl font-black mb-6">AI 위험성평가 <span class="text-purple-600">Pro</span></h2>
                <div class="jelly-card bg-white p-0 overflow-hidden mb-6">
                    <div class="aspect-video bg-slate-100 flex items-center justify-center border-b border-slate-50">
                        <i data-lucide="smartphone" class="w-16 h-16 text-purple-200"></i>
                    </div>
                    <div class="p-6">
                        <h4 class="font-black text-lg mb-2">현장 유해인자 스캔</h4>
                        <p class="text-sm text-slate-500 leading-relaxed mb-4">사진 한 장으로 도장, 용접, 분진 위험을 즉시 분석하고 위험성평가표를 자동 생성합니다.</p>
                        <button class="w-full py-4 bg-slate-900 text-white rounded-2xl font-black active:scale-95 transition-all">분석 엔진 가동</button>
                    </div>
                </div>
            </div>
        `,
        warehouse: `
            <div class="animate-in slide-in-from-right-5 duration-500">
                <h2 class="text-2xl font-black mb-6">디지털 <span class="text-purple-600">창고</span></h2>
                <div class="relative mb-6">
                    <input type="text" placeholder="서식 또는 지침 검색" class="w-full py-4 pl-12 pr-4 bg-white rounded-2xl border-none shadow-sm text-sm outline-none focus:ring-2 focus:ring-purple-200" />
                    <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 w-5 h-5"></i>
                </div>
                <div class="space-y-3">
                    <div class="jelly-card flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 bg-purple-50 rounded-xl flex items-center justify-center"><i data-lucide="file-text" class="text-purple-500 w-5 h-5"></i></div>
                            <div>
                                <p class="font-bold text-sm">특검 유해인자 목록</p>
                                <p class="text-[10px] text-slate-400 uppercase font-bold">PDF • 1.2MB</p>
                            </div>
                        </div>
                        <i data-lucide="download" class="text-slate-300 w-5 h-5"></i>
                    </div>
                    <div class="jelly-card flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 bg-pink-50 rounded-xl flex items-center justify-center"><i data-lucide="clipboard" class="text-pink-500 w-5 h-5"></i></div>
                            <div>
                                <p class="font-bold text-sm">보호구 지급 대장 양식</p>
                                <p class="text-[10px] text-slate-400 uppercase font-bold">XLSX • 88KB</p>

                        </div>
                        <i data-lucide="download" class="text-slate-300 w-5 h-5"></i>
                    </div>
                </div>
            </div>
        `,
        profile: `
            <div class="animate-in slide-in-from-right-5 duration-500 pt-6 flex flex-col items-center">

                    <div class="w-full h-full bg-purple-100 flex items-center justify-center text-purple-400">
                        <i data-lucide="user" class="w-12 h-12"></i>
                    </div>
                </div>
                <h2 class="text-2xl font-black mb-1 text-slate-800">Claire Park</h2>
                <p class="text-sm font-bold text-purple-500 uppercase tracking-widest mb-8 text-center">Industrial Health Professional</p>
                
                <div class="flex gap-4 mb-10">
                    <div class="w-12 h-12 glass rounded-2xl flex items-center justify-center text-slate-600"><i data-lucide="mail"></i></div>
                    <div class="w-12 h-12 glass rounded-2xl flex items-center justify-center text-slate-600"><i data-lucide="link-2"></i></div>
                    <div class="w-12 h-12 glass rounded-2xl flex items-center justify-center text-slate-600"><i data-lucide="instagram"></i></div>
                </div>

                <div class="w-full space-y-4">
                    <div class="jelly-card">
                        <h4 class="font-bold text-xs text-slate-400 uppercase mb-2">보건 핵심 역량</h4>
                        <ul class="space-y-3">
                            <li class="flex items-center gap-2 text-sm font-medium"><i data-lucide="award" class="w-4 h-4 text-purple-500"></i> 산업보건 지도사 자격</li>
                            <li class="flex items-center gap-2 text-sm font-medium"><i data-lucide="award" class="w-4 h-4 text-purple-500"></i> 데이터 기반 건강 사후관리 시스템</li>
                            <li class="flex items-center gap-2 text-sm font-medium"><i data-lucide="award" class="w-4 h-4 text-purple-500"></i> 중대재해 보건 리스크 진단</li>
                        </ul>
                    </div>
                </div>
            </div>
        `
    };

    function switchTab(tab, el) {
        document.getElementById('content').innerHTML = contents[tab];
        document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
        el.classList.add('active');
        lucide.createIcons();
        document.getElementById('content').scrollTop = 0;
    }

    // 초기 홈 화면 로드
    window.onload = () => {
        document.getElementById('content').innerHTML = contents.home;
        lucide.createIcons();
    };
</script>

</body>
</html>
